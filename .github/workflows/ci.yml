name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile RadarProcessor
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc
          gcc -Wall -Wextra -c RadarProcessor.c -o /dev/null
